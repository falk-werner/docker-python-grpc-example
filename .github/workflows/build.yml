name: Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:

  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7
      
      - name: Set up Qemu
        uses:  docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build
        uses: docker/build-push-action@v7
        with:
          push: false
          load: true
          platforms: linux/arm64
          tags: python-grpc-greeter
          outputs: "type=docker,dest=python-grpc-greeter.tar"

      - name: Upload
        uses: actions/upload-artifact@v7
        with:
          name: python-grpc-greeter.tar
          path: python-grpc-greeter.tar
          retention-days: 5
          overwrite: true
          archive: false
